# Build the Create_Resume backend Docker image, publish it to GHCR, then deploy to
# the Pi. Runs on every push to main:
#   1. build-and-push — build the arm64 image and push it to GHCR.
#   2. deploy-to-pi    — join the tailnet, SSH to the Pi, pull + restart the stack.
# The Pi is reached privately over Tailscale (no public SSH).
name: Build, publish, and deploy backend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # QEMU lets the amd64 runner emulate arm64 (the Pi's CPU).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/axlothecook/create-resume-backend:latest

  # --- Deploy the freshly-built stack onto the Raspberry Pi ------------------
  # A backend push should also roll the stack so the new API image goes live.
  deploy-to-pi:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # The tailscale action returns as soon as tailscaled is up and authenticated, but
      # the PATH to the Pi (peer discovery / NAT traversal) can take a few more seconds.
      # SSH dialling into that gap failed the deploy with `dial tcp ***:22: i/o timeout`
      # even though the build was fine. Wait for port 22 to actually answer first.
      - name: Wait for the Pi to be reachable over Tailscale
        run: |
          for i in $(seq 1 30); do
            if timeout 5 bash -c "</dev/tcp/${{ secrets.PI_TAILSCALE_IP }}/22" 2>/dev/null; then
              echo "Pi answered on port 22 (attempt $i)"
              exit 0
            fi
            echo "attempt $i/30: no route to the Pi yet, retrying in 5s…"
            sleep 5
          done
          echo "::error::the Pi never became reachable on port 22 over Tailscale (2.5 min)"
          exit 1

      - name: Deploy on the Pi
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_TAILSCALE_IP }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          # CONNECT timeout (default 30s). The wait step above means the route is already
          # up, so this is just headroom for a slow handshake — NOT the same knob as
          # command_timeout (which bounds how long the remote COMMAND may run).
          timeout: 60s
          script: |
            cd ~/create-resume-deploy
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
